<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Trabajo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📅 Control de Trabajo</h1>

<div class="nav">
<button onclick="mesAnterior()">⬅</button>
<h2 id="mesActual"></h2>
<button onclick="mesSiguiente()">➡</button>
</div>

<div class="semana">
<div>L</div>
<div>M</div>
<div>X</div>
<div>J</div>
<div>V</div>
<div>S</div>
<div>D</div>
</div>

<div id="calendar"></div>

<div id="formulario" class="hidden">

<h2 id="fechaSeleccionada"></h2>

<label>Tipo:</label>
<select id="tipo">
<option value="trabajo">Trabajo</option>
<option value="vacaciones">Vacaciones</option>
</select>

<div id="horas">

<label>Entrada:</label>
<input type="time" id="entrada">

<label>Salida:</label>
<input type="time" id="salida">

</div>

<button onclick="guardar()">Guardar</button>
<button onclick="cerrar()">Cancelar</button>
<button onclick="eliminar()">Eliminar</button>

</div>

<script src="app.js"></script>

</body>
</html>
