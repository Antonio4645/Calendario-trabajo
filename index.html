<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Calendario de Trabajo</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
</head>
<body>

<div class="header">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Mi Calendario de Trabajo</h1>
</div>

<div class="nav">
    <button onclick="mesAnterior()">⬅</button>
    <h2 id="mesActual"></h2>
    <button onclick="mesSiguiente()">➡</button>
</div>

<div class="semana">
    <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div id="calendar"></div>

<!-- Formulario -->
<div id="formulario" class="hidden">
    <h2 id="fechaSeleccionada"></h2>

    <label>Tipo de día:</label>
    <select id="tipo">
        <option value="normal">Trabajo normal</option>
        <option value="vacaciones">Vacaciones</option>
        <option value="festivo">Festivo</option>
        <option value="festivo-trabajado">Festivo trabajado</option>
        <option value="urbano">Trabajo urbano</option>
    </select>

    <label>Notas:</label>
    <textarea id="notas" rows="3" placeholder="Escribe aquí tus notas..."></textarea>

    <button onclick="ficharEntrada()">Fichar Entrada</button>
    <button onclick="ficharSalida()">Fichar Salida</button>
    <button onclick="guardarTipo()">Guardar Tipo/Nota</button>
    <button onclick="eliminarDia()">Eliminar Día</button>
    <button onclick="cerrar()">Cancelar</button>
</div>

<!-- Resumen -->
<div id="resumen"></div>

<script src="app.js"></script>
</body>
</html>
